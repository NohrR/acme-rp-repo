<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS Login</title>
  <link rel="icon" type="image/png" href="./assets/ACMEFavicon.png" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body.simple-page {
      overflow-x: hidden;
      overflow-y: auto;
      background: #ff7937;
    }

    .cms-auth-shell {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - var(--topbar-h));
      padding: clamp(40px, 6vw, 84px) 24px 84px;
      display: grid;
      place-items: center;
    }

    .cms-auth-card {
      width: min(520px, 100%);
      padding: clamp(28px, 4vw, 42px);
      border: 1px solid rgba(17, 17, 17, 0.08);
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 24px 52px rgba(17, 17, 17, 0.08);
      backdrop-filter: blur(10px);
    }

    .cms-auth-kicker {
      margin: 0 0 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #c66b00;
    }

    .cms-auth-title {
      margin: 0 0 14px;
      font-family: "FuturaCyrillicBold", system-ui, sans-serif;
      font-size: clamp(34px, 4.5vw, 52px);
      line-height: 1.02;
      color: #111111;
    }

    .cms-auth-copy {
      margin: 0 0 24px;
      font-size: 17px;
      line-height: 1.72;
      color: rgba(17, 17, 17, 0.72);
    }

    .cms-auth-form {
      display: grid;
      gap: 18px;
    }

    .cms-auth-field {
      display: grid;
      gap: 8px;
    }

    .cms-auth-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(17, 17, 17, 0.5);
    }

    .cms-auth-input {
      width: 100%;
      border: 1px solid rgba(17, 17, 17, 0.12);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.94);
      color: #111111;
      font: inherit;
      padding: 14px 16px;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    .cms-auth-input:focus {
      border-color: rgba(255, 138, 0, 0.58);
      box-shadow: 0 0 0 3px rgba(255, 138, 0, 0.14);
    }

    .cms-auth-submit {
      min-height: 54px;
      border: 0;
      border-radius: 999px;
      background: #111111;
      color: #ffffff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .cms-auth-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 26px rgba(17, 17, 17, 0.16);
    }

    .cms-auth-status {
      margin: 0;
      min-height: 22px;
      font-size: 14px;
      color: rgba(17, 17, 17, 0.62);
    }
  </style>
  <link rel="stylesheet" href="neutral-theme-overrides.css" />
</head>

<body class="simple-page">
  <header class="topbar" role="banner">
    <div class="nav-inner">
      <nav class="site-nav" aria-label="Primary">
        <a class="nav-link" href="./about.html">ABOUT</a>
        <div class="nav-dropdown">
          <a class="nav-link" href="./services.html">SERVICES</a>
          <div class="nav-dropdown-menu" aria-label="Services links">
            <a class="nav-dropdown-link" href="./services.html">Interactive Overview</a>
            <a class="nav-dropdown-link" href="./services-detailed.html">Full Service Breakdown</a>
          </div>
        </div>
        <a class="nav-link" href="./news.html">NEWS</a>
        <a class="nav-link" href="./contact.html">CONTACT</a>
      </nav>
    </div>
  </header>

  <main class="cms-auth-shell">
    <section class="cms-auth-card" aria-labelledby="cms-login-title">
      <p class="cms-auth-kicker">News CMS</p>
      <h1 class="cms-auth-title" id="cms-login-title">Sign In</h1>
      <p class="cms-auth-copy">
        Use the CMS credentials configured on the server to publish and manage articles shown on the public News page.
      </p>

      <form class="cms-auth-form" id="cms-login-form">
        <div class="cms-auth-field">
          <label class="cms-auth-label" for="cms-username">Username</label>
          <input class="cms-auth-input" id="cms-username" name="username" type="text" autocomplete="username" required />
        </div>

        <div class="cms-auth-field">
          <label class="cms-auth-label" for="cms-password">Password</label>
          <input class="cms-auth-input" id="cms-password" name="password" type="password" autocomplete="current-password" required />
        </div>

        <button class="cms-auth-submit" id="cms-login-submit" type="submit">Enter CMS</button>
        <p class="cms-auth-status" id="cms-login-status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="cms-login.js"></script>
</body>
</html>
