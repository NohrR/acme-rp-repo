<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACME</title>
  <link rel="icon" type="image/png" href="./assets/ACMEFavicon.png" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html,
    body.main-page,
    .news-feed-list,
    .news-detail-body {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    html::-webkit-scrollbar,
    body.main-page::-webkit-scrollbar,
    .news-feed-list::-webkit-scrollbar,
    .news-detail-body::-webkit-scrollbar {
      display: none;
    }

    body.main-page {
      position: relative;
      overflow-y: auto;
      background: #ff8434;
      padding-top: 0;
      scroll-behavior: smooth;
      scroll-snap-type: y mandatory;
      overscroll-behavior-y: contain;
    }

    .page-load-reveal {
      opacity: 0;
      transform: translateY(34px) scale(0.985);
      transition:
        opacity 720ms cubic-bezier(0.22, 1, 0.36, 1),
        transform 820ms cubic-bezier(0.22, 1, 0.36, 1);
      transition-delay: var(--reveal-delay, 0ms);
      will-change: opacity, transform;
    }

    body.main-page.is-page-ready .page-load-reveal {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    @media (prefers-reduced-motion: reduce) {
      .page-load-reveal,
      body.main-page.is-page-ready .page-load-reveal {
        opacity: 1;
        transform: none;
        transition: none;
      }
    }

    .main-page .page {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 50px 0 12px;
    }

    .main-corner-anchor {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 80;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
    }

    .main-corner-asset {
      display: block;
      height: auto;
      pointer-events: none;
      user-select: none;
    }

    .main-corner-asset {
      width: clamp(500px, 10vw, 500px);
      max-width: 18vw;
    }

    .page-login-link {
      left: clamp(18px, 2.6vw, 32px);
      right: auto;
    }

    .main-shell {
      width: calc(100vw - 100px);
      min-height: calc(100vh - 100px);
      display: grid;
      gap: clamp(20px, 3vw, 34px);
      padding-bottom: clamp(10px, 1.4vw, 16px);
      padding-left: clamp(100px, 3vw, 42px);
      padding-right: clamp(100px, 3vw, 42px);
      position: relative;
    }

    .main-stage-top {
      position: relative;
      z-index: 140;
      min-height: clamp(56px, 6vw, 82px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-brand-lockup {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
    }

    .main-home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .main-logo-corner {
      display: block;
      width: clamp(126px, 11vw, 184px);
      max-width: 24vw;
      height: auto;
      pointer-events: none;
      user-select: none;
    }

    .main-page .nav-link {
      color: rgba(255, 255, 255, 0.92);
      font-size: clamp(16px, 1.15vw, 18px);
    }

    .main-page .nav-link::after {
      background: #ffffff;
    }

    .main-page .nav-link:hover,
    .main-page .nav-link[aria-current="page"] {
      color: #ffffff;
    }

    .main-page .site-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(18px, 2.5vw, 36px);
      flex-wrap: wrap;
    }

    .news-page-title {
      margin: 0;
      text-align: center;
      font-family: "FuturaCyrillicBold", system-ui, sans-serif;
      font-size: clamp(42px, 6vw, 88px);
      line-height: 0.94;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff9f0;
      text-shadow: 0 14px 30px rgba(120, 54, 0, 0.18);
    }

    .news-main-panel {
      width: 100%;
      min-height: calc(100vh - 190px);
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .news-workspace {
      width: min(1320px, 100%);
      min-height: calc(100vh - 190px);
      border: 2px solid rgba(255, 255, 255, 0.94);
      border-radius: 36px;
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 26px 50px rgba(128, 56, 0, 0.14);
      backdrop-filter: blur(10px);
      padding: clamp(18px, 2vw, 28px);
      display: grid;
      grid-template-columns: minmax(260px, 0.38fr) minmax(0, 1fr);
      gap: clamp(18px, 2vw, 26px);
      overflow: hidden;
    }

    .news-feed-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 16px;
      padding-right: clamp(4px, 0.6vw, 10px);
      border-right: 1px solid rgba(255, 255, 255, 0.22);
    }

    .news-detail-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      gap: 16px;
      padding-left: clamp(4px, 0.4vw, 10px);
    }

    .news-panel-kicker {
      margin: 0;
      font-family: "FuturaCyrillicBold", system-ui, sans-serif;
      font-size: clamp(20px, 2vw, 28px);
      line-height: 1;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #fff9f0;
    }

    .news-status {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 249, 240, 0.78);
    }

    .news-feed-list {
      min-height: 0;
      overflow-y: auto;
      display: grid;
      gap: 14px;
      padding-right: 6px;
    }

    .news-feed-item {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      padding: 18px;
      display: grid;
      gap: 12px;
      text-align: left;
      cursor: pointer;
      color: inherit;
      transition:
        transform 180ms ease,
        border-color 180ms ease,
        background-color 180ms ease,
        box-shadow 180ms ease;
    }

    .news-feed-item:hover,
    .news-feed-item:focus-visible {
      border-color: rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
      outline: none;
      box-shadow: 0 14px 28px rgba(128, 56, 0, 0.12);
    }

    .news-feed-item.is-active {
      border-color: #ffffff;
      background: rgba(255, 255, 255, 0.16);
      box-shadow: 0 18px 32px rgba(128, 56, 0, 0.16);
    }

    .news-feed-title {
      margin: 0;
      font-family: "FuturaCyrillicBold", system-ui, sans-serif;
      font-size: clamp(18px, 1.5vw, 24px);
      line-height: 1.08;
      color: #fff9f0;
    }

    .news-feed-summary {
      margin: 0;
      font-size: 14px;
      line-height: 1.65;
      color: rgba(255, 249, 240, 0.8);
    }

    .news-detail-surface,
    .news-empty {
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 18px 38px rgba(128, 56, 0, 0.12);
      backdrop-filter: blur(10px);
    }

    .news-detail-surface {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      gap: 16px;
      padding: clamp(20px, 2.2vw, 30px);
    }

    .news-detail-body {
      min-height: 0;
      overflow-y: auto;
      display: grid;
      gap: 14px;
      padding-right: 8px;
    }

    .news-detail-image-wrap,
    .news-feed-image-wrap {
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.08);
    }

    .news-detail-image,
    .news-feed-image {
      display: block;
      width: 100%;
      object-fit: cover;
    }

    .news-detail-image {
      aspect-ratio: 16 / 6.5;
    }

    .news-feed-image {
      aspect-ratio: 16 / 8.8;
    }

    .news-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 249, 240, 0.66);
    }

    .news-detail-title {
      margin: 0;
      font-family: "FuturaCyrillicBold", system-ui, sans-serif;
      font-size: clamp(30px, 3vw, 48px);
      line-height: 1.04;
      color: #fff9f0;
    }

    .news-detail-summary {
      margin: 0;
      font-size: clamp(17px, 1.4vw, 22px);
      line-height: 1.78;
      color: rgba(255, 249, 240, 0.86);
    }

    .news-detail-body p {
      margin: 0;
      font-size: 15px;
      line-height: 1.8;
      color: rgba(255, 249, 240, 0.82);
    }

    .news-empty {
      padding: 28px;
      display: grid;
      place-items: center;
      text-align: center;
      color: rgba(255, 249, 240, 0.82);
    }

    .main-scene-panel {
      display: none;
    }

    @media (max-width: 960px) {
      .main-shell {
        width: calc(100vw - 100px);
        min-height: calc(100vh - 100px);
      }

      .news-page-section {
        min-height: calc(100vh - 100px);
      }

      .main-brand-lockup {
        position: relative;
        transform: none;
        justify-self: start;
      }

      .main-stage-top {
        min-height: auto;
        display: grid;
        justify-items: center;
        gap: 14px;
      }

      .main-page .site-nav {
        gap: 12px 20px;
        justify-self: center;
      }

      .news-workspace {
        min-height: auto;
        grid-template-columns: 1fr;
      }

      .news-feed-panel {
        min-height: 280px;
        border-right: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.22);
        padding-right: 0;
        padding-bottom: 18px;
      }

      .news-detail-panel {
        padding-left: 0;
      }
    }

    @media (max-width: 720px) {
      .main-page .page {
        padding: 24px 0 8px;
      }

      .main-shell {
        width: calc(100vw - 32px);
        min-height: calc(100vh - 32px);
        padding-left: 20px;
        padding-right: 20px;
      }

      .news-workspace {
        min-height: calc(100vh - 164px);
        padding: 16px;
      }
    }
  </style>
  <link rel="stylesheet" href="neutral-theme-overrides.css" />
</head>
<body class="main-page">
  <div class="main-corner-anchor" aria-hidden="true">
    <img
      class="main-corner-asset"
      src="./ASSETS/CornerAsset.png"
      alt=""
      aria-hidden="true"
    />
  </div>

  <main class="page">
    <div class="main-shell">
      <header class="main-stage-top page-load-reveal" style="--reveal-delay: 40ms;" aria-label="Site header">
        <div class="main-brand-lockup">
          <a class="main-home-link" href="./main.html" aria-label="Return to main page">
            <img
              class="main-logo-corner"
              src="./ASSETS/acme.png"
              alt="ACME logo"
            />
          </a>
        </div>

        <nav class="site-nav" aria-label="Primary">
          <a class="nav-link" href="./about.html">ABOUT</a>
          <div class="nav-dropdown">
            <a class="nav-link" href="./services.html">SERVICES</a>
            <div class="nav-dropdown-menu" aria-label="Services links">
              <a class="nav-dropdown-link" href="./services.html">Interactive Overview</a>
              <a class="nav-dropdown-link" href="./services-detailed.html">Full Service Breakdown</a>
            </div>
          </div>
          <a class="nav-link" href="./news.html">NEWS</a>
          <a class="nav-link" href="./contact.html">CONTACT</a>
        </nav>
      </header>

      <h1 class="news-page-title page-load-reveal" style="--reveal-delay: 120ms;">News</h1>

      <section class="news-main-panel page-load-reveal" style="--reveal-delay: 180ms;" aria-labelledby="news-feed-title">
        <div class="news-workspace">
          <aside class="news-feed-panel" aria-labelledby="news-feed-title">
            <p class="news-panel-kicker" id="news-feed-title">Latest Articles</p>
            <p class="news-status" id="news-status" aria-live="polite">Loading the latest articles...</p>
            <div class="news-feed-list" id="news-list" aria-live="polite"></div>
          </aside>

          <section class="news-detail-panel" aria-labelledby="news-detail-title">
            <p class="news-panel-kicker">Article</p>
            <div class="news-detail-surface" id="news-detail" aria-live="polite"></div>
          </section>
        </div>
      </section>

      <footer class="page-site-footer page-load-reveal" style="--reveal-delay: 260ms;" aria-label="Site footer">
        <div class="page-site-footer__inner">
          <div class="page-site-footer__brand">
            <img class="page-site-footer__logo" src="./assets/acme.png" alt="ACME logo" />
          </div>
          <div class="page-site-footer__social" aria-label="Social media">
            <div class="page-site-footer__social-links">
              <button class="page-site-footer__social-button" type="button" aria-label="Instagram">
                <svg class="page-site-footer__social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="3.5" y="3.5" width="17" height="17" rx="5"></rect>
                  <circle cx="12" cy="12" r="4"></circle>
                  <circle cx="17.2" cy="6.8" r="1" fill="currentColor" stroke="none"></circle>
                </svg>
              </button>
              <button class="page-site-footer__social-button" type="button" aria-label="Facebook">
                <svg class="page-site-footer__social-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M13.4 20.5v-7h2.3l.35-2.8H13.4V8.95c0-.81.23-1.36 1.39-1.36h1.48V5.1c-.26-.04-1.14-.1-2.17-.1-2.15 0-3.62 1.31-3.62 3.73v1.97H8v2.8h2.52v7h2.88Z"></path>
                </svg>
              </button>
            </div>
            <p class="page-site-footer__copy">Copyright &copy; ACME Mold Ltd. All Rights Reserved</p>
          </div>
          <div class="page-site-footer__credit" aria-label="Zezu logo">
            <img class="page-site-footer__creator-logo" src="./assets/zezu.png" alt="Zezu logo" />
            <p class="page-site-footer__creator-label">Site created by</p>
          </div>
        </div>
      </footer>
    </div>
  </main>

  <a class="page-login-link" href="./cms-login.html" aria-label="Login">
    <img class="page-login-icon" src="./ASSETS/loginicon.png" alt="" aria-hidden="true" />
  </a>

  <script>
    (() => {
      const body = document.body;

      if (!body) {
        return;
      }

      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        body.classList.add("is-page-ready");
        return;
      }

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          body.classList.add("is-page-ready");
        });
      });
    })();
  </script>
  <script src="./news.js"></script>
</body>
</html>
