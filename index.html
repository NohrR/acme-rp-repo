<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />

  <title>ACME Mold Ltd.</title>
  <link rel="icon" type="image/png" href="./assets/ACMEFavicon.png" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    html,
    body {
      height: 100%;
    }

    body.home-page {
      padding-top: 0;
      overflow: hidden;
      background: #ffffff;
    }

    .hero-shell {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #ffffff;
    }

    .hero-lottie-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .hero-lottie-stage {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: 0 0;
      will-change: transform;
      opacity: 0;
    }

    .hero-lottie-layer.is-visible .hero-lottie-stage {
      opacity: 1;
    }

    .hero-lottie-stage svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hero-video {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      object-fit: cover;
      background: #ffffff;
    }

    .hero-resume-prompt {
      position: absolute;
      left: 50%;
      bottom: clamp(20px, 5vh, 44px);
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 1.4vw, 18px);
      max-width: min(92vw, 760px);
      padding: 0 20px;
      color: #ff6f3c;
      font-family: "FuturaCyrillicBold", system-ui, sans-serif;
      font-size: clamp(14px, 1.8vw, 22px);
      line-height: 1.15;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      transform: translate(-50%, 28px);
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 320ms ease,
        transform 420ms cubic-bezier(0.18, 0.84, 0.32, 1);
    }

    .hero-resume-prompt.is-visible {
      transform: translate(-50%, 0);
      opacity: 1;
    }

    .hero-resume-copy {
      display: block;
    }

    .hero-click-cue {
      position: relative;
      flex: 0 0 auto;
      width: clamp(34px, 3.8vw, 46px);
      height: clamp(34px, 3.8vw, 46px);
    }

    .hero-click-button {
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(12px, 1.2vw, 14px);
      height: clamp(12px, 1.2vw, 14px);
      border: 2px solid rgba(255, 111, 60, 0.96);
      border-radius: 999px;
      background: rgba(255, 111, 60, 0.16);
      transform: translate(-50%, -50%);
      animation: hero-click-button-pulse 1.4s ease-in-out infinite;
    }

    .hero-click-ripple {
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(16px, 1.8vw, 20px);
      height: clamp(16px, 1.8vw, 20px);
      border: 2px solid rgba(255, 111, 60, 0.7);
      border-radius: 999px;
      transform: translate(-50%, -50%) scale(0.45);
      opacity: 0;
      animation: hero-click-ripple 1.4s ease-out infinite;
    }

    .hero-click-pointer {
      position: absolute;
      left: 52%;
      top: 50%;
      width: clamp(18px, 1.9vw, 24px);
      height: clamp(24px, 2.8vw, 32px);
      background-image: url("./ASSETS/clicker.png");
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
      filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.35));
      transform-origin: 38% 10%;
      animation: hero-click-pointer 1.4s ease-in-out infinite;
    }

    @keyframes hero-click-pointer {
      0%,
      100% {
        transform: translate(8px, 9px) scale(1);
      }

      26%,
      38% {
        transform: translate(2px, 2px) scale(0.92);
      }

      58% {
        transform: translate(6px, 7px) scale(0.98);
      }
    }

    @keyframes hero-click-ripple {
      0%,
      18% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.45);
      }

      30% {
        opacity: 0.9;
      }

      65% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.95);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.95);
      }
    }

    @keyframes hero-click-button-pulse {
      0%,
      100% {
        background: rgba(255, 111, 60, 0.16);
      }

      26%,
      38% {
        background: rgba(255, 111, 60, 0.34);
      }
    }
  </style>
  <link rel="stylesheet" href="neutral-theme-overrides.css" />
</head>
<body class="home-page">
  <main class="hero-shell" id="hero-shell" aria-label="Homepage background video">
    <div class="hero-lottie-layer" id="hero-lottie-layer" aria-hidden="true">
      <div class="hero-lottie-stage" id="hero-lottie-stage"></div>
    </div>
    <video
      class="hero-video"
      id="hero-video"
      autoplay
      muted
      playsinline
      preload="auto"
      aria-label="Rendered homepage video"
    >
      <source src="./ASSETS/videos/hero-render.mp4" type="video/mp4" />
    </video>

    <p class="hero-resume-prompt" id="hero-resume-prompt" aria-live="polite">
      <span class="hero-resume-copy">CLICK ANYWHERE TO EXPLORE OUR SITE</span>
      <span class="hero-click-cue" aria-hidden="true">
        <span class="hero-click-ripple"></span>
        <span class="hero-click-button"></span>
        <span class="hero-click-pointer"></span>
      </span>
    </p>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.13.0/lottie.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
